<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ app_name }}</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; line-height: 1.5; color: #1a1a1a; margin: 0; padding: 0; background: #f4f4f5; }
    .wrap { max-width: 560px; margin: 0 auto; padding: 24px 16px; }
    .card { background: #fff; border-radius: 8px; padding: 28px 24px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    h1 { font-size: 1.25rem; margin: 0 0 12px; }
    p { margin: 0 0 16px; font-size: 0.95rem; }
    .btn { display: inline-block; padding: 12px 20px; background: #2563eb; color: #fff !important; text-decoration: none; border-radius: 6px; font-weight: 600; font-size: 0.95rem; }
    .muted { color: #71717a; font-size: 0.8rem; margin-top: 24px; }
    .footer { text-align: center; margin-top: 20px; font-size: 0.75rem; color: #a1a1aa; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      {% block content %}{% endblock %}
    </div>
    <p class="footer">{{ app_name }}</p>
  </div>
</body>
</html>
